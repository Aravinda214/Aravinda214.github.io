<link rel="stylesheet" href="{{ "css/custom.css" | relURL }}">
<link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
<link rel="shortcut icon" href="{{ "favicon.svg" | relURL }}">
<style>
  .page-footer {
    display: block !important;
  }

  .article-project .article-metadata .article-date,
  .article-project .article-metadata .article-reading-time {
    display: none !important;
  }

  .article-project .article-style p,
  .article-project .article-style li {
    font-size: 1rem;
    line-height: 1.75;
  }

  .view-article-grid .card-simple,
  .view-showcase .card-simple,
  .view-compact .card-simple {
    height: 100%;
  }

  .view-article-grid .article-metadata,
  .view-showcase .article-metadata {
    margin-top: 0.45rem;
  }

  .view-article-grid .article-title,
  .view-showcase .article-title {
    margin-bottom: 0.55rem;
  }

  .view-article-grid .article-style,
  .view-showcase .article-style {
    margin-top: 0;
  }

  .resume-skills-rows {
    max-width: 78rem;
    margin: 0 auto;
    padding: 0 1.25rem;
  }

  .skills-rows {
    display: grid;
    gap: 1rem;
  }

  .skills-row-card {
    display: grid;
    grid-template-columns: minmax(0, 15rem) minmax(0, 1fr);
    gap: 1.25rem;
    padding: 1.15rem 1.25rem;
    border: 1px solid rgba(148, 163, 184, 0.24);
    border-radius: 1rem;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.04);
  }

  .dark .skills-row-card {
    background: rgba(17, 24, 39, 0.9);
    border-color: rgba(255, 255, 255, 0.08);
  }

  .skills-row-heading h3 {
    margin: 0;
    font-size: 1.2rem;
    font-weight: 800;
    line-height: 1.3;
  }

  .skills-row-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.8rem 1.25rem;
  }

  .skills-row-item {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
  }

  .skills-row-icon {
    flex: 0 0 auto;
    color: #0f766e;
    margin-top: 0.18rem;
  }

  .skills-row-text {
    line-height: 1.55;
    letter-spacing: normal;
    text-transform: none;
  }

  @media (max-width: 900px) {
    .skills-row-card {
      grid-template-columns: 1fr;
      gap: 0.85rem;
    }

    .skills-row-list {
      grid-template-columns: 1fr;
    }
  }
</style>
<script async defer src="https://buttons.github.io/buttons.js"></script>
